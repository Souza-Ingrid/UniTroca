<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <title>UniTroca</title>
</head>

<body style="background-color: #f5f7fa;">

<div class="container mt-5">

    <!-- Título -->
    <h1 class="text-center mb-2">📚 UniTroca</h1>
    <p class="text-center text-muted mb-4">
        Troque, doe ou encontre materiais acadêmicos
    </p>

    <!-- FORMULÁRIO -->
    <div class="card p-4 shadow-sm mb-4">
        <h4 class="mb-3">Postar novo item</h4>

        <input type="text" id="item" class="form-control mb-2" placeholder="Nome do item">

        <input type="text" id="curso" class="form-control mb-2" placeholder="Curso">

        <select id="categoria" class="form-control mb-2">
            <option value="todos">Categoria</option>
            <option value="livro">Livro</option>
            <option value="resumo">Resumo</option>
            <option value="calculadora">Calculadora</option>
            <option value="outro">Outro</option>
        </select>

        <textarea id="descricao" class="form-control mb-2" placeholder="Descrição"></textarea>

        <!-- (Por enquanto não usamos imagem no Firebase ainda) -->
        <input type="file" id="imagem" class="form-control mb-3">

        <button class="btn btn-primary w-100" onclick="postarItem()">
            Postar
        </button>
    </div>

    <!-- FILTRO -->
    <div class="card p-3 shadow-sm mb-4">
        <div class="row">
            
            <div class="col-md-6">
                <input 
                    type="text" 
                    id="busca" 
                    class="form-control" 
                    placeholder="Buscar por nome..."
                    oninput="filtrar()"
                >
            </div>

            <div class="col-md-6">
                <select 
                    id="filtroCategoria" 
                    class="form-control"
                    onchange="filtrar()"
                >
                    <option value="todos">Todas categorias</option>
                    <option value="livro">Livro</option>
                    <option value="resumo">Resumo</option>
                    <option value="calculadora">Calculadora</option>
                    <option value="outro">Outro</option>
                </select>
            </div>

        </div>
    </div>

    <!-- LISTA -->
    <div id="lista" class="row"></div>

</div>

<!-- 🔥 IMPORTANTE: script como module -->
<script type="module" src="script.js"></script>

</body>
</html>
